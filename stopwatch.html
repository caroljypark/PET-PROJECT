<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스탑워치</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff44f;
    font-family: 'Segoe UI', sans-serif;
    position: relative;
    overflow: hidden;
  }
  .bg-face {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }
  .card {
    position: relative;
    z-index: 1;
    padding: 40px 50px;
    text-align: center;
    width: 360px;
    background: rgba(255, 244, 79, 0.55);
    border-radius: 24px;
    backdrop-filter: blur(3px);
  }
  .time {
    font-size: 56px;
    font-weight: 700;
    color: #1f2937;
    letter-spacing: 2px;
    margin-bottom: 30px;
    font-variant-numeric: tabular-nums;
  }
  .time .ms { font-size: 28px; color: #57534e; }
  .buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 20px;
  }
  button {
    border: none;
    border-radius: 12px;
    padding: 12px 22px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  button:active { transform: scale(0.95); }
  #startStop { background: #22c55e; color: white; }
  #startStop.running { background: #ef4444; }
  #lap { background: #334155; color: #e2e8f0; }
  #reset { background: #475569; color: #e2e8f0; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  ul#laps {
    list-style: none;
    margin: 0;
    padding: 0;
    max-height: 180px;
    overflow-y: auto;
    text-align: left;
  }
  ul#laps li {
    display: flex;
    justify-content: space-between;
    padding: 8px 10px;
    color: #1f2937;
    font-size: 14px;
    border-bottom: 1px solid rgba(31,41,55,0.2);
    font-variant-numeric: tabular-nums;
  }
  ul#laps li span:first-child { color: #57534e; }
</style>
</head>
<body>
  <svg class="bg-face" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <rect width="400" height="400" fill="#fff44f"/>
    <polygon points="120,40 280,30 320,160 260,260 300,360 180,390 60,330 40,180" fill="#e8c84a" stroke="#1f2937" stroke-width="3"/>
    <polygon points="120,40 200,90 280,30 320,160 230,140" fill="#d6863b" stroke="#1f2937" stroke-width="3"/>
    <polygon points="60,330 180,390 150,300 90,260" fill="#4f7cac" stroke="#1f2937" stroke-width="3"/>
    <polygon points="300,360 260,260 220,310 240,380" fill="#2f5d8a" stroke="#1f2937" stroke-width="3"/>
    <polygon points="200,90 230,140 150,170 120,110" fill="#f2efe4" stroke="#1f2937" stroke-width="3"/>
    <ellipse cx="150" cy="140" rx="26" ry="16" fill="#f2efe4" stroke="#1f2937" stroke-width="3" transform="rotate(-10 150 140)"/>
    <circle cx="150" cy="140" r="7" fill="#1f2937"/>
    <polygon points="240,110 290,130 255,165 215,150" fill="#f2efe4" stroke="#1f2937" stroke-width="3"/>
    <ellipse cx="255" cy="135" rx="14" ry="22" fill="#f2efe4" stroke="#1f2937" stroke-width="3" transform="rotate(25 255 135)"/>
    <circle cx="258" cy="138" r="6" fill="#1f2937"/>
    <polygon points="200,150 215,210 185,230 175,170" fill="#d6863b" stroke="#1f2937" stroke-width="3"/>
    <path d="M150,260 Q200,300 260,255" fill="none" stroke="#1f2937" stroke-width="6" stroke-linecap="round"/>
    <polygon points="120,250 170,255 150,300 100,290" fill="#b23a3a" stroke="#1f2937" stroke-width="3"/>
    <path d="M70,90 Q140,20 230,30" fill="none" stroke="#1f2937" stroke-width="4"/>
    <path d="M260,90 Q320,110 310,180" fill="none" stroke="#1f2937" stroke-width="4"/>
  </svg>
  <div class="card">
    <div class="time" id="display">00:00:00<span class="ms">.00</span></div>
    <div class="buttons">
      <button id="startStop">시작</button>
      <button id="lap" disabled>랩</button>
      <button id="reset">리셋</button>
    </div>
    <ul id="laps"></ul>
  </div>

<script>
  let startTime = 0;
  let elapsed = 0;
  let running = false;
  let timerId = null;
  let lapCount = 0;

  const display = document.getElementById('display');
  const startStopBtn = document.getElementById('startStop');
  const lapBtn = document.getElementById('lap');
  const resetBtn = document.getElementById('reset');
  const lapsList = document.getElementById('laps');

  function format(ms) {
    const totalMs = Math.floor(ms);
    const hours = Math.floor(totalMs / 3600000);
    const minutes = Math.floor((totalMs % 3600000) / 60000);
    const seconds = Math.floor((totalMs % 60000) / 1000);
    const centis = Math.floor((totalMs % 1000) / 10);
    const pad = (n, l = 2) => String(n).padStart(l, '0');
    return {
      main: `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`,
      ms: pad(centis)
    };
  }

  function render() {
    const now = running ? elapsed + (performance.now() - startTime) : elapsed;
    const { main, ms } = format(now);
    display.innerHTML = `${main}<span class="ms">.${ms}</span>`;
  }

  function tick() {
    render();
    timerId = requestAnimationFrame(tick);
  }

  startStopBtn.addEventListener('click', () => {
    if (!running) {
      running = true;
      startTime = performance.now();
      startStopBtn.textContent = '정지';
      startStopBtn.classList.add('running');
      lapBtn.disabled = false;
      tick();
    } else {
      running = false;
      elapsed += performance.now() - startTime;
      startStopBtn.textContent = '시작';
      startStopBtn.classList.remove('running');
      lapBtn.disabled = true;
      cancelAnimationFrame(timerId);
      render();
    }
  });

  lapBtn.addEventListener('click', () => {
    lapCount++;
    const now = elapsed + (performance.now() - startTime);
    const { main, ms } = format(now);
    const li = document.createElement('li');
    li.innerHTML = `<span>랩 ${lapCount}</span><span>${main}.${ms}</span>`;
    lapsList.prepend(li);
  });

  resetBtn.addEventListener('click', () => {
    running = false;
    elapsed = 0;
    lapCount = 0;
    cancelAnimationFrame(timerId);
    startStopBtn.textContent = '시작';
    startStopBtn.classList.remove('running');
    lapBtn.disabled = true;
    lapsList.innerHTML = '';
    render();
  });

  render();
</script>
</body>
</html>
